name: ZMTransform CI

on:
  push:
  pull_request:

jobs: #ogni job è un workflow separato
  quality: #crea un ambiente virtuale, installa le dipendenze e lancia i test
    name: Lint, test and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pylint
        run: pylint src tests

      - name: Tests with coverage
        run: |
          coverage run -m pytest
          coverage report
          coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zmtransform:${{ github.sha }} .
