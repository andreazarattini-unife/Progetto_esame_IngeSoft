name: ZMTransform CI


on:
  push:
  pull_request:

permissions:
    contents: read
    packages: write

jobs: #ogni job è un workflow separato
  quality: #crea un ambiente virtuale, installa le dipendenze e lancia i test
    name: Lint, test and coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pylint
        run: pylint src tests

      - name: Tests with coverage
        run: |
          coverage run -m pytest
          coverage report
          coverage xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: quality

    # Pubblica solo se è un push su main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zmtransform:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/zmtransform:latest

